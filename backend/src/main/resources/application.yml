server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: jiber-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jiber}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${DB_USER:jiber}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jiber:
  app-env: ${APP_ENV:local}
  cors:
    allowed-origins: ${BACKEND_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend:
    public-base-url: ${FRONTEND_PUBLIC_BASE_URL:http://localhost:5173}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:jiber-local}
      secret: ${JWT_SECRET:}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      app-env: ${APP_ENV:local}
    refresh-token:
      ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}
      app-env: ${APP_ENV:local}
      cookie:
        name: ${AUTH_REFRESH_TOKEN_COOKIE_NAME:JIBER_REFRESH_TOKEN}
        path: ${AUTH_REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
        same-site: ${AUTH_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
        secure: ${AUTH_REFRESH_TOKEN_COOKIE_SECURE:false}
    oauth2:
      google:
        client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
        client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
        redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
      kakao:
        client-id: ${OAUTH_KAKAO_CLIENT_ID:}
        client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
        redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
      naver:
        client-id: ${OAUTH_NAVER_CLIENT_ID:}
        client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
        redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:http://localhost:8080/login/oauth2/code/naver}
  model-server:
    base-url: ${MODEL_SERVER_BASE_URL:http://localhost:8000}
    internal-token: ${MODEL_SERVER_INTERNAL_TOKEN:}
    connect-timeout-ms: ${MODEL_SERVER_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${MODEL_SERVER_READ_TIMEOUT_MS:5000}
    model-version: ${MODEL_VERSION:hedonic-v1}
    baseline-date: ${MODEL_BASELINE_DATE:2026-06-12}
    feature-set-version: ${MODEL_FEATURE_SET_VERSION:apartment-basic-v1}
  public-data:
    service-key: ${PUBLIC_DATA_SERVICE_KEY:}
    import-months: ${PUBLIC_DATA_IMPORT_MONTHS:12}
    target-regions: ${PUBLIC_DATA_TARGET_REGIONS:SEOUL,BUSAN}
    enabled: ${PUBLIC_DATA_IMPORT_ENABLED:false}
    dry-run: ${PUBLIC_DATA_IMPORT_DRY_RUN:true}
    limit: ${PUBLIC_DATA_IMPORT_LIMIT:100}
    page-size: ${PUBLIC_DATA_IMPORT_PAGE_SIZE:100}
    base-url: ${PUBLIC_DATA_BASE_URL:https://apis.data.go.kr}
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}
      base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
